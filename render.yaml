services:
  - type: web
    name: plannisthenics
    runtime: ruby
    plan: free
    buildCommand: "bundle install && bundle exec rails assets:precompile"
    startCommand: "bundle exec rails db:prepare && bundle exec rails server -b 0.0.0.0 -p $PORT"
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_LEVEL
        value: info
      - key: SOLID_QUEUE_IN_PUMA
        value: "true"
      - key: RAILS_MASTER_KEY
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: GMAIL_USERNAME
        sync: false
      - key: GMAIL_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: plannisthenics-db
          property: connectionString

databases:
  - name: plannisthenics-db
    databaseName: plannisthenics_production
    plan: free
