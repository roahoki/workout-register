app = "plannisthenics"
primary_region = "mia"

[build]

[deploy]
  release_command = "bin/rails db:prepare"

[env]
  RAILS_LOG_LEVEL = "info"
  SOLID_QUEUE_IN_PUMA = "true"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "plannisthenics_storage"
  destination = "/rails/storage"
